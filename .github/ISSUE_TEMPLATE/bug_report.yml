---
name: Bug Report
description: Report a bug or unexpected behavior in dkod
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: dkod version
      description: "Run `dk --version` to find your version"
      placeholder: "e.g. 0.3.2"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of dkod is affected?
      options:
        - CLI (dk)
        - MCP Server
        - Web App (app.dkod.io)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: "What happened? What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `dk connect ...`
        2. Run `dk context "..."`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any relevant error messages or logs
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent / IDE (if applicable)
      options:
        - Claude Code
        - Cursor
        - Codex
        - Windsurf
        - Cline
        - Other
        - N/A
