<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#06b6d4" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#09090b"/>
  <rect width="1200" height="400" fill="url(#dots)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>
  <ellipse cx="600" cy="180" rx="400" ry="250" fill="url(#orb)"/>

  <!-- Icon logo -->
  <image x="518" y="95" width="80" height="80" href="data:image/png;base64,"/>

  <!-- dkod wordmark -->
  <text x="648" y="163" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-2" fill="#f0f0f3">dkod</text>

  <!-- Accent line -->
  <rect x="565" y="190" width="70" height="3" rx="1.5" fill="#06b6d4"/>

  <!-- Tagline -->
  <text x="600" y="237" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#71717a" letter-spacing="0.5">Agent-native code platform</text>

  <!-- Pulse dot -->
  <circle cx="600" cy="272" r="3" fill="#06b6d4" opacity="0.6"/>
  <circle cx="600" cy="272" r="6" fill="#06b6d4" opacity="0.15"/>

  <!-- Subtle bottom border -->
  <rect x="0" y="397" width="1200" height="3" fill="url(#glow)"/>
</svg>
