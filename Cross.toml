[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libssl-dev:$CROSS_DEB_ARCH curl unzip",
    "curl -sLO https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip && echo '3e866620c5be27664f3d2fa2d656b5f3e09b5152b42f1bedbf427b333e90021a  protoc-29.3-linux-x86_64.zip' | sha256sum -c - && unzip -oq protoc-29.3-linux-x86_64.zip -d /usr/local && rm protoc-29.3-linux-x86_64.zip",
]
